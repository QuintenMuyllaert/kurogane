<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kurogane: IPC transport characterization suite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="app://app/dashboard.css" rel="stylesheet">
</head>

<body>
<div class="shell">
  <header>
    <h1 class="header-title">IPC transport characterization suite</h1>
    <p class="header-sub">Evaluating latency and throughput under varying load conditions</p>
  </header>

  <section class="panel" id="sysinfo-panel">
    <div class="panel-title">
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"/>
      </svg>
      System information
    </div>
    <div class="sysinfo-grid">
      <div class="sysinfo-item">
        <span class="sysinfo-label">Engine</span>
        <span class="sysinfo-value" id="si-engine">-</span>
      </div>
      <div class="sysinfo-item">
        <span class="sysinfo-label">CPU cores</span>
        <span class="sysinfo-value" id="si-cores">-</span>
      </div>
    </div>
  </section>

  <section class="panel overall-panel" id="overall-panel">
    <div class="overall-header">
      <span class="overall-label">Overall progress</span>
      <span class="overall-pct" id="overall-pct">0%</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" id="overall-bar"></div>
    </div>
  </section>

  <div class="card-grid" id="card-grid"></div>

  <section class="summary-panel" id="summary-panel">
    <div class="summary-header">
      <h2 class="summary-title">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        Benchmark complete
      </h2>
      <div style="display:flex;align-items:center;gap:10px">
        <button class="btn" id="copy-btn">
          <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
          </svg>
          copy json
        </button>
        <span class="copy-ok" id="copy-ok">copied ✓</span>
      </div>
    </div>
    <div class="summary-stats" id="summary-stats"></div>
    <div class="summary-table" id="summary-table"></div>
  </section>

  <div>
    <button class="console-toggle" id="console-toggle">
      <svg class="console-chevron" id="console-chevron" width="12" height="12"
           fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
      </svg>
      view console log
    </button>
    <div class="console-wrap" id="console-wrap">
      <pre id="console-log"></pre>
    </div>
  </div>

</div>

<script type="module" src="app://app/runner.js"></script>
</body>
</html>
